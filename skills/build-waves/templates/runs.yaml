# .ai-lore/runs.yaml  -- the registry of plan builds for this repo.
# The ONLY cross-plan shared state. Gitignored. build-waves is its writer.
# Each active or finished build has one entry. Plans not listed here have never been built.

runs:
  - slug: 2026-06-23-example-plan
    status: in_progress          # in_progress | complete | blocked | submitted | merged
    worktree: ../myrepo-wt/2026-06-23-example-plan   # "." when built directly in the main checkout
    branch: plan/example-plan                        # the branch the worktree is on ("" when worktree is ".")
    base_branch: main                                # branch the worktree was cut from; cleanup targets PRs at it
    lock: { owner: session-abc123, since: 2026-06-23T14:02Z }   # cleared (lock: null) on finish or clean exit
    progress: { wave: 2, of: 4, tasks_done: 5, tasks_total: 9 }
    pr_url: null                                     # set by the cleanup skill once a PR is opened
    review_status: null                              # null | complete -- set by ail-review after a review run
    review_file: null                                # path to .ai-lore/plans/<slug>/review.md once reviewed
    updated: 2026-06-23T14:31Z
