# .ai-lore project settings for the ai-lore plugin (ail-plan-waves / ail-build-waves / ail-cleanup).
# Gitignored (per-clone execution config). Auto-created by ail-config, ail-plan-waves, or ail-build-waves if missing.
#
# These commands are how the plugin verifies work, and they are intentionally codebase-agnostic.
# Fill them with whatever this project actually uses (any language, any toolchain). The plugin
# auto-detects sensible defaults when this file is missing, but this file always wins.
#
# Canonical template managed by ail-config. Skills that need to write a config reference this file
# at <plugin_root>/skills/config/templates/config.yaml.

plugin_version: 0.7.6            # set by ail-config; used to detect when migrations are needed.

# Optional hint for the dependency/build manager, used only to help infer the commands below.
# Auto-detected from the repo when omitted. Examples by ecosystem:
#   Node:   pnpm | npm | yarn | bun        Python: uv | poetry | pip | hatch
#   Rust:   cargo                          Go:     go
#   Ruby:   bundler                        .NET:   dotnet
#   Java/Kotlin: maven | gradle
package_manager: pnpm

gate:                          # ail-build-waves runs these in order to verify a wave before marking its tasks complete.
  - pnpm check                 # Replace with this project's real checks. Examples:
  - pnpm typecheck             #   Node:   pnpm check / pnpm typecheck / pnpm lint
                               #   Python: ruff check . / mypy . / pytest -q
                               #   Rust:   cargo clippy --all-targets / cargo build
                               #   Go:     go vet ./... / go build ./...

test_command: pnpm test        # how a task's test-based acceptance criteria are run.
                               #   Python: pytest      Rust: cargo test      Go: go test ./...

worktrees:
  default: true                # build each plan in its own git worktree by default (isolated, stable base cut from a committed tip).
                               # set false to build in the main checkout unless the user asks for a worktree.
  dir: .ai-lore/worktrees      # where per-plan worktrees are created (relative to repo root); each plan lands at <dir>/<slug>

plan:
  html_preview: false          # generate a read-only HTML preview of plan.md and all task files after ail-plan-waves writes the plan.
                               # requires Node.js. open .ai-lore/plans/<slug>/plan.html in a browser to read.
                               # WARNING: do not edit plan.html directly; it is auto-generated and will be overwritten.
